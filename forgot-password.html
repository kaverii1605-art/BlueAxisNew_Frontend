<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f4f9ff,#9aa8c2);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* FORM CARD */

#forgotForm{

    width:100%;
    max-width:420px;

    background:#ffffff;

    padding:45px 35px;

    border-radius:22px;

    box-shadow:
    0 25px 60px rgba(0,0,0,0.15);

    position:relative;

    overflow:hidden;

    animation:fadeUp 0.8s ease;
}

/* SHIMMER EFFECT */

#forgotForm::before{

    content:"";

    position:absolute;

    top:-150%;
    left:-100%;

    width:60%;
    height:400%;

    background:rgba(255,255,255,0.18);

    transform:rotate(25deg);

    animation:shineMove 7s linear infinite;
}

/* INPUT */

#email{

    width:100%;

    padding:16px 18px;

    border-radius:14px;

    border:1px solid #dcdcdc;

    font-size:15px;

    outline:none;

    transition:0.35s ease;

    margin-bottom:22px;

    box-sizing:border-box;
}

/* INPUT FOCUS */

#email:focus{

    border-color:#0056d2;

    box-shadow:
    0 0 15px rgba(0,86,210,0.18);

    transform:translateY(-2px);
}

/* BUTTON */

button{

    width:100%;

    border:none;

    padding:15px;

    border-radius:50px;

    font-size:15px;

    font-weight:600;

    color:#ffffff;

    cursor:pointer;

    background:linear-gradient(
        135deg,
        #0056d2,
        #d62424
    );

    transition:0.35s ease;

    position:relative;

    overflow:hidden;

    animation:buttonPulse 3s infinite;
}

/* BUTTON SHINE */

button::after{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:45%;
    height:100%;

    background:rgba(255,255,255,0.28);

    transform:skewX(-20deg);

    transition:0.7s;
}

button:hover::after{
    left:140%;
}

/* BUTTON HOVER */

button:hover{

    transform:translateY(-4px);

    box-shadow:
    0 12px 30px rgba(0,0,0,0.22);
}

/* FORM ENTRY */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(35px) scale(0.96);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }

}

/* SHIMMER */

@keyframes shineMove{

    0%{
        left:-100%;
    }

    100%{
        left:180%;
    }

}

/* BUTTON PULSE */

@keyframes buttonPulse{

    0%{
        box-shadow:0 0 0 0 rgba(0,86,210,0.28);
    }

    70%{
        box-shadow:0 0 0 14px rgba(0,86,210,0);
    }

    100%{
        box-shadow:0 0 0 0 rgba(0,86,210,0);
    }

}

/* MOBILE */

@media(max-width:480px){

    #forgotForm{

        margin:20px;

        padding:35px 22px;
    }

}

</style>


<form id="forgotForm">
  <input type="email" id="email" placeholder="Enter your email" required>
  <button type="submit">Send Reset Link</button>
</form>

<script>
document.getElementById("forgotForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;


   try {

    const response = await fetch("https://blueaxis-backend-6-t0qp.onrender.com/api/forgot-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const text = await response.text();

    let data = {};

    try {
      data = text ? JSON.parse(text) : {};
    } catch(err) {
      data = { message: text };
    }

    if (!response.ok) {
      alert(data.message || "Something went wrong");
      return;
    }

    alert(data.message || "Reset link sent successfully");

  } catch(error) {

    console.error(error);
    alert("Could not connect to server");

  }

  const data = await response.json();
  alert(data.message);
});
</script>
