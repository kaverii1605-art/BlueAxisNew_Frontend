<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f4f9ff,#9aa8c2);
    font-family:'Poppins',sans-serif;
}

.forgot-wrapper{
    width:900px;
    min-height:520px;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    display:flex;
    box-shadow:0 25px 60px rgba(0,0,0,0.18);
}

.forgot-left{
    width:45%;
    background:linear-gradient(160deg,#cbd8ee,#e31f2f);
    padding:35px 30px;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.forgot-left img{
  position: relative;
                top: auto;
                left: auto;
                margin-bottom: 30px;margin-top: 20px;
                width: 180px;position: relative;
  top: -18px;
  left: 0;
  margin-bottom: 30px;
  margin-top: 0;
  width: 180px;
  transition:0.4s ease;
}

.forgot-left-content{
    margin-bottom:120px;
    text-align:center;
}

.forgot-left-content h1{
    font-size:34px;
    margin-bottom:18px;
}

.forgot-left-content p{
    font-size:15px;
    font-weight:500;
}

.forgot-right{
    width:55%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

#forgotForm{
    width:100%;
    max-width:410px;
    box-shadow:none;
    padding:0;
    border-radius:0;
    animation:none;
    overflow:visible;
}

#forgotForm::before{
    display:none;
}

.form-title{
    text-align:center;
    font-size:28px;
    margin-bottom:28px;
    font-weight:700;
    color:#111;
}

#email{
    width:100%;
    padding:15px 18px;
    border-radius:12px;
    border:1px solid #dcdcdc;
    font-size:15px;
    outline:none;
    margin-bottom:22px;
    box-sizing:border-box;
    background:#eef5ff;
}

#email:focus{
    border-color:#0056d2;
    box-shadow:0 0 15px rgba(0,86,210,0.18);
}

button{
    width:100%;
    border:none;
    padding:15px;
    border-radius:50px;
    font-size:15px;
    font-weight:600;
    color:#ffffff;
    cursor:pointer;
    background:linear-gradient(135deg,#0056d2,#d62424);
    transition:0.35s ease;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,0.22);
}

.back-login{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.back-login a{
    color:#0056d2;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:768px){
    .forgot-wrapper{
        width:92%;
        flex-direction:column;
    }

    .forgot-left,
    .forgot-right{
        width:100%;
        box-sizing:border-box;
    }

    .forgot-left-content{
        margin:60px 0;
    }
}
</style>


<style>
    /* MAIN CARD ENTRY */
.forgot-wrapper{
    animation:cardFade 1s ease;
}

/* LEFT PANEL FLOAT */
.forgot-left{
    position:relative;
    overflow:hidden;
}

.forgot-left::before{
    content:"";
    position:absolute;
    width:260px;
    height:260px;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
    top:-80px;
    right:-70px;
    animation:floatBlob 6s ease-in-out infinite;
}

.forgot-left::after{
    content:"";
    position:absolute;
    width:170px;
    height:170px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    bottom:-40px;
    left:-40px;
    animation:floatBlob2 7s ease-in-out infinite;
}

/* LOGO ANIMATION */
.forgot-left img{
    animation:logoSlide 1s ease;
}

/* TEXT ANIMATION */
.forgot-left-content h1{
    animation:leftText 1s ease;
}

.forgot-left-content p{
    animation:leftText 1.2s ease;
}

/* RIGHT SIDE */
.forgot-right{
    animation:rightFade 1s ease;
}

/* INPUT */
#email{
    transition:0.4s ease;
}

#email:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(0,0,0,0.08);
}

/* BUTTON */
button{
    position:relative;
    overflow:hidden;
    animation:buttonPulse 2.5s infinite;
}

button::after{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:40%;
    height:100%;
    background:rgba(255,255,255,0.35);
    transform:skewX(-20deg);
}

button:hover::after{
    animation:shine 0.8s linear;
}

/* BACKGROUND */
body{
    background-size:200% 200%;
    animation:bgMove 10s ease infinite;
}

/* KEYFRAMES */

@keyframes cardFade{
    from{
        opacity:0;
        transform:translateY(35px) scale(0.96);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes logoSlide{
    from{
        opacity:0;
        transform:translateX(-40px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes leftText{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes rightFade{
    from{
        opacity:0;
        transform:translateX(35px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes floatBlob{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(22px);
    }
}

@keyframes floatBlob2{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-18px);
    }
}

@keyframes shine{
    0%{
        left:-120%;
    }
    100%{
        left:150%;
    }
}

@keyframes buttonPulse{
    0%{
        box-shadow:0 0 0 0 rgba(0,86,210,0.28);
    }
    70%{
        box-shadow:0 0 0 14px rgba(0,86,210,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(0,86,210,0);
    }
}

@keyframes bgMove{
    0%{
        background-position:left top;
    }
    50%{
        background-position:right bottom;
    }
    100%{
        background-position:left top;
    }
}
</style>

<div class="forgot-wrapper">

    <div class="forgot-left">
        <img src="assets/images/blueaxisLogo.png" alt="BlueAxis Media">

        <div class="forgot-left-content">
            <h1>Forgot Password?</h1>
            <p>Enter your email to receive reset link</p>
        </div>
    </div>

    <div class="forgot-right">
        <form id="forgotForm">
            <h2 class="form-title">Reset Password</h2>

            <input type="email" id="email" placeholder="Enter your email" required>

            <button type="submit">Send Reset Link</button>

            <div class="back-login">
                Remember password? <a href="login.html">Login</a>
            </div>
        </form>

    </div>

</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;

  try {
    const response = await fetch("https://blueaxis-backend-6-t0qp.onrender.com/api/send-reset-link", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email: email })
    });

    const text = await response.text();

    let data = {};

    try {
      data = text ? JSON.parse(text) : {};
    } catch(err) {
      data = { message: text };
    }

    if (!response.ok) {
      alert(data.message || "Something went wrong");
      return;
    }

alert((data.message || "Reset link generated") + "\n" + (data.resetLink || ""));
  } catch(error) {
    console.error(error);
    alert("Could not connect to server");
  }
});
</script>
