button{

}

button:hover{
    transform:translateY(-3px);

.back-login{

.back-login a{

    text-decoration:none;
    font-weight:600;
}

@media(max-width:768px){
    .forgot-wrapper{
        width:92%;
        flex-direction:column;
    }

    .forgot-left,
    .forgot-right{
        width:100%;
        box-sizing:border-box;
    }

    .forgot-left-content{
        margin:60px 0;
    }
}
</style>

<div class="forgot-wrapper">

    <div class="forgot-left">
        <img src="assets/images/blueaxisLogo.png" alt="BlueAxis Media">

        <div class="forgot-left-content">
            <h1>Forgot Password?</h1>
            <p>Enter your email to receive reset link</p>
        </div>
    </div>

    <div class="forgot-right">
        <form id="forgotForm">
            <h2 class="form-title">Reset Password</h2>

            <input type="email" id="email" placeholder="Enter your email" required>

            <button type="submit">Send Reset Link</button>

            <div class="back-login">
                Remember password? <a href="login.html">Login</a>
            </div>
        </form>

    </div>

</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;

  try {
    const response = await fetch("https://blueaxis-backend-6-t0qp.onrender.com/api/send-reset-link", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email: email })
    });

    const text = await response.text();

    let data = {};

    try {
      data = text ? JSON.parse(text) : {};
    } catch(err) {
      data = { message: text };
    }

    if (!response.ok) {
      alert(data.message || "Something went wrong");
      return;
    }

alert((data.message || "Reset link generated") + "\n" + (data.resetLink || ""));
  } catch(error) {
    console.error(error);
    alert("Could not connect to server");
  }
});
</script>
