<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - BlueAxis Media</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* BODY */
/* BODY */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f4f9ff, #9aa8c2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

/* MAIN CARD */
.signup-container {
    display: flex;
    width: 900px;
    height: 520px;
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

/* LEFT PANEL */
.left-panel {
    flex: 1;
    background: linear-gradient(135deg, #baceeb, rgba(218, 32, 33, 255));
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

/* Logo */
.logo-left {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 180px;
}

/* Text */
.left-content h2 {
    font-size: 30px;
    font-weight: 700;
}

.left-content p {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.9;
}

/* RIGHT PANEL */
.right-panel {
    flex: 1;
    background: #ffffff;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-top-right-radius: 20px;
    border-bottom-right-radius: 20px;
}

/* TITLE */
.right-panel h2 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 700;
}

/* INPUTS */
.input-group {
    margin-bottom: 15px;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.3s;
    box-sizing: border-box;
}

/* Focus effect */
.input-group input:focus,
.input-group select:focus {
    border-color: #0056d2;
    box-shadow: 0 0 10px rgba(0,86,210,0.2);
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #0056d2, #d62424);
    color: white;
    font-weight: 600;
    transition: 0.3s;
    cursor: pointer;
}

/* Hover */
button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* LOGIN LINK */
.switch {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.switch a {
    color: #0056d2;
    font-weight: 600;
    text-decoration: none;
}

/* MESSAGE */
#message {
    text-align: center;
    margin-top: 10px;
}

/* RESPONSIVE */
@media (max-width: 960px) {
    .signup-container {
        width: 95%;
        height: auto;
    }
}

@media (max-width: 768px) {
    .signup-container {
        flex-direction: column;
        width: 95%;
        max-width: 420px;
        height: auto;
        margin: 20px 0;
    }

    .left-panel {
        height: auto;
        padding: 40px 20px;
        flex-direction: column;
        flex: none;
        min-height: 180px;
    }

    .logo-left {
        position: relative;
        top: auto;
        left: auto;
        margin-bottom: 15px;
        width: 140px;
    }

    .left-content h2 {
        font-size: 22px;
    }

    .left-content p {
        font-size: 13px;
    }

    .right-panel {
        padding: 30px 20px;
        flex: none;
        border-top-right-radius: 0;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
    }

    .right-panel h2 {
        font-size: 20px;
        margin-bottom: 18px;
    }

    .input-group {
        margin-bottom: 12px;
    }

    .input-group input,
    .input-group select {
        padding: 10px 12px;
        font-size: 14px;
    }

    button {
        padding: 11px;
        font-size: 14px;
    }

    .switch {
        font-size: 13px;
    }
}

@media (max-width: 380px) {
    .right-panel {
        padding: 25px 15px;
    }

    .logo-left {
        width: 120px;
    }

    .left-content h2 {
        font-size: 19px;
    }
}

</style>
</head>

<body>

<div class="signup-container">

    <!-- LEFT -->
    <div class="left-panel">
            <img src="./assets/images/blueaxisLogo.png" class="logo-left" alt="logo">

        <div class="left-content">
            <h2>Create your Account</h2>
            <p>Join BlueAxis Media and grow your digital presence</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <h2>Sign Up</h2>

        <form id="registerForm">

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <div class="input-group">
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="ADMIN">Admin</option>
                    <option value="USER">User</option>
                </select>
            </div>

            <button type="submit">Sign Up</button>

        </form>

        <div id="message"></div>

        <div class="switch">
            Already have an account? <a href="login.html">Login</a>
        </div>

    </div>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const role = document.getElementById("role").value;
  const message = document.getElementById("message");

  if (password !== confirmPassword) {
    message.innerHTML = "Passwords do not match!";
    message.style.color = "red";
    return;
  }

  message.innerHTML = "Please wait...";
  message.style.color = "gray";

  try {
    const response = await fetch("https://blueaxis-backend-10.onrender.com/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, username, password, role })
    });

    const result = await response.json();

    if (!response.ok) {
      // Server returned 4xx or 5xx — show the actual error from backend
      message.innerHTML = result.message || `Error: ${response.status}`;
      message.style.color = "red";
      return;
    }

    message.innerHTML = result.message || "Registration successful!";
    message.style.color = "green";
    localStorage.setItem("registeredEmail", email);

    setTimeout(() => { window.location.href = "/login.html"; }, 1500);

  } catch (error) {
    // Network error, CORS block, or server completely down
    console.error("Registration error:", error);
    message.innerHTML = "Could not reach server. Check your connection or try again in a moment.";
    message.style.color = "red";
  }
});

</script>
</body>
</html>
