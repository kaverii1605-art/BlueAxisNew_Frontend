}

form{

button:hover{

@keyframes cardFade{

@keyframes logoSlide{

    /* ===== NOTIFICATION ===== */

.notification{

}

}
</style>

<div class="reset-wrapper">

    <div class="reset-left">
        <img src="assets/images/blueaxisLogo.png" alt="BlueAxis Media">

        <div class="reset-left-content">
            <h1>Reset Password</h1>
            <p>Create a new password for your account</p>
        </div>
    </div>

    <div class="reset-right">
        <form id="resetForm">
            <h2 class="form-title">New Password</h2>

           <div class="password-box">
    <input type="text" id="password" placeholder="Enter new password" required>
    <i class="fas fa-eye-slash" onclick="togglePassword('password', this)"></i>
</div>

<div class="password-box">
    <input type="text" id="confirmPassword" placeholder="Confirm new password" required>
    <i class="fas fa-eye-slash" onclick="togglePassword('confirmPassword', this)"></i>
</div>

            <button type="submit">Reset Password</button>
        </form>
    </div>

</div>


<script>
function showNotification(message, type = 'success', duration = 4000) {

    const container = document.getElementById('notificationContainer');

    const notification = document.createElement('div');

    notification.className = `notification ${type}`;

    notification.innerHTML = `
        <div class="notification-icon">
            ${type === 'success' ? '✓' : '✕'}
        </div>

        <div class="notification-content">
            ${message}
        </div>
    `;

    container.appendChild(notification);

    setTimeout(() => {
        if(notification.parentElement){
            notification.classList.add('hide');
            setTimeout(() => notification.remove(), 300);
        }
    }, duration);
}
</script>



<script>

function togglePassword(id, icon) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }
}
        
document.getElementById("resetForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;


  if (password !== confirmPassword) {
 showNotification("New password and confirm password must be same", "error");
  return;
}



  try {
    const response = await fetch("https://blueaxis-backend-6-t0qp.onrender.com/api/update-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token: token,
        password: password
      })
    });

    const text = await response.text();

    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch (err) {
      data = { message: text };
    }

showNotification(data.message || "Something went wrong", response.ok ? "success" : "error");
    if (response.ok && data.message === "Password reset successfully") {
      window.location.href = "login.html";
    }

  } catch (error) {
    console.error(error);
showNotification("Could not connect to server", "error");
  }
});
</script>
