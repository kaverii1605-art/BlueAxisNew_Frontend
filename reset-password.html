<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f4f9ff,#9aa8c2);
    background-size:200% 200%;
    animation:bgMove 10s ease infinite;
    font-family:'Poppins',sans-serif;
}

.reset-wrapper{
    width:900px;
    min-height:520px;
    background:#fff;
    border-radius:22px;
    overflow:hidden;
    display:flex;
    box-shadow:0 25px 60px rgba(0,0,0,0.18);
    animation:cardFade 1s ease;
}

.reset-left{
    width:45%;
    background:linear-gradient(160deg,#cbd8ee,#e31f2f);
    padding:35px 30px;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
    overflow:hidden;
}

.reset-left::before{
    content:"";
    position:absolute;
    width:260px;
    height:260px;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
    top:-80px;
    right:-70px;
    animation:floatBlob 6s ease-in-out infinite;
}

.reset-left::after{
    content:"";
    position:absolute;
    width:170px;
    height:170px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    bottom:-40px;
    left:-40px;
    animation:floatBlob2 7s ease-in-out infinite;
}

.reset-left img{
    position:relative;
    top:-18px;
    left:0;
    width:180px;
    z-index:2;
    animation:logoSlide 1s ease;
}

.reset-left-content{
    margin-bottom:120px;
    text-align:center;
    position:relative;
    z-index:2;
}

.reset-left-content h1{
    font-size:34px;
    margin-bottom:18px;
    animation:leftText 1s ease;
}

.reset-left-content p{
    font-size:15px;
    font-weight:500;
    animation:leftText 1.2s ease;
}

.reset-right{
    width:55%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
    animation:rightFade 1s ease;
}

form{
    width:100%;
    max-width:410px;
    box-shadow:none;
    padding:0;
    border-radius:0;
    background:transparent;
}

.form-title{
    text-align:center;
    font-size:28px;
    margin-bottom:28px;
    font-weight:700;
    color:#111;
}

.password-box{
    position:relative;
}

input{
    width:100%;
    padding:15px 45px 15px 18px;
    margin-bottom:20px;
    border-radius:14px;
    border:1px solid #ddd;
    font-size:15px;
    box-sizing:border-box;
    background:#eef5ff;
    transition:0.4s ease;
}

input:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(0,0,0,0.08);
}

input:focus{
    border-color:#0056d2;
    outline:none;
    box-shadow:0 0 15px rgba(0,86,210,0.2);
}

.password-box i{
    position:absolute;
    right:16px;
    top:16px;
    color:#777;
    cursor:pointer;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#0056d2,#d62424);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.35s ease;
    position:relative;
    overflow:hidden;
    animation:buttonPulse 2.5s infinite;
}

button::after{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:40%;
    height:100%;
    background:rgba(255,255,255,0.35);
    transform:skewX(-20deg);
}

button:hover::after{
    animation:shine 0.8s linear;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

@keyframes cardFade{
    from{opacity:0; transform:translateY(35px) scale(0.96);}
    to{opacity:1; transform:translateY(0) scale(1);}
}

@keyframes logoSlide{
    from{opacity:0; transform:translateX(-40px);}
    to{opacity:1; transform:translateX(0);}
}

@keyframes leftText{
    from{opacity:0; transform:translateY(25px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes rightFade{
    from{opacity:0; transform:translateX(35px);}
    to{opacity:1; transform:translateX(0);}
}

@keyframes floatBlob{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(22px);}
}

@keyframes floatBlob2{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-18px);}
}

@keyframes shine{
    0%{left:-120%;}
    100%{left:150%;}
}

@keyframes buttonPulse{
    0%{box-shadow:0 0 0 0 rgba(0,86,210,0.28);}
    70%{box-shadow:0 0 0 14px rgba(0,86,210,0);}
    100%{box-shadow:0 0 0 0 rgba(0,86,210,0);}
}

@keyframes bgMove{
    0%{background-position:left top;}
    50%{background-position:right bottom;}
    100%{background-position:left top;}
}

@media(max-width:768px){
    .reset-wrapper{
        width:92%;
        flex-direction:column;
    }

    .reset-left,
    .reset-right{
        width:100%;
        box-sizing:border-box;
    }

    .reset-left-content{
        margin:60px 0;
    }
}
</style>

<div class="reset-wrapper">

    <div class="reset-left">
        <img src="assets/images/blueaxisLogo.png" alt="BlueAxis Media">

        <div class="reset-left-content">
            <h1>Reset Password</h1>
            <p>Create a new password for your account</p>
        </div>
    </div>

    <div class="reset-right">
        <form id="resetForm">
            <h2 class="form-title">New Password</h2>

            <div class="password-box">
                <input type="password" id="password" placeholder="Enter new password" required>
                <i class="fas fa-eye" onclick="togglePassword()"></i>
            </div>

            <div class="password-box">
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                <i class="fas fa-eye" onclick="togglePassword()"></i>
            </div>

            <button type="submit">Reset Password</button>
        </form>
    </div>

</div>

<script>
document.getElementById("resetForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;


  if (password !== confirmPassword) {
  alert("New password and confirm password must be same");
  return;
}

/* PASSWORD TOGGLE */
        function togglePassword() {
            const pass = document.getElementById("password");
            pass.type = pass.type === "password" ? "text" : "password";
        }

  try {
    const response = await fetch("https://blueaxis-backend-6-t0qp.onrender.com/api/update-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token: token,
        password: password
      })
    });

    const text = await response.text();

    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch (err) {
      data = { message: text };
    }

    alert(data.message || "Something went wrong");

    if (response.ok && data.message === "Password reset successfully") {
      window.location.href = "login.html";
    }

  } catch (error) {
    console.error(error);
    alert("Could not connect to server");
  }
});
</script>
