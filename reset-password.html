<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins', Arial, sans-serif;
    background:linear-gradient(135deg,#f4f9ff,#9aa8c2);
}

form{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:45px 35px;
    border-radius:22px;
    box-shadow:0 25px 60px rgba(0,0,0,0.15);
}

input{
    width:100%;
    padding:15px 18px;
    margin-bottom:20px;
    border-radius:14px;
    border:1px solid #ddd;
    font-size:15px;
    box-sizing:border-box;
}

input:focus{
    border-color:#0056d2;
    outline:none;
    box-shadow:0 0 15px rgba(0,86,210,0.2);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#0056d2,#d62424);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
}
</style>



<form id="resetForm">
  <input type="password" id="password" placeholder="Enter new password" required>
  <button type="submit">Reset Password</button>
</form>

<script>
document.getElementById("resetForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  const password = document.getElementById("password").value;

  const response = await fetch("https://blueaxis-backend-6-t0qp.onrender.com/api/update-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      token: token,
      password: password
    })
  });

  const data = await response.json();
  alert(data.message);

  if (data.message === "Password reset successfully") {
    window.location.href = "login.html";
  }
});
</script>
