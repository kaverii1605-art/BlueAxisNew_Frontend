    <style>
 /* ================= GLOBAL ================= */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #eef3f9, #f9fbff);
    margin: 0;
    overflow-x: hidden;
}

/* Soft background glow */
body::before,
body::after {
    content: "";
    position: fixed;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    opacity: 0.4;
}

body::before {
    background: #007bff;
    top: -100px;
    left: -100px;
}

body::after {
    background: #ff4d4d;
    bottom: -100px;
    right: -100px;
}

/* ================= HEADER ================= */
.display-4 {
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #0056d2, #ff3c3c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ================= LOGOUT ================= */
#logoutButton {
    border-radius: 30px;
    font-weight: 600;
    padding: 8px 20px;
    background: linear-gradient(45deg,#ffc107,#ff9800);
    border: none;
    transition: 0.3s;
}

#logoutButton:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(255,152,0,0.4);
}

/* ================= CARD ================= */
.card {
    border-radius: 18px !important;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    transition: 0.4s ease;
}

.card:hover {
    transform: translateY(-6px);
}

/* ================= BUTTONS ================= */
.btn-danger {
    background: linear-gradient(45deg,#ff4d4d,#e60023);
    border: none;
    font-weight: 600;
    transition: 0.3s;
}

.btn-danger:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255,0,0,0.3);
}

.btn-warning {
    background: linear-gradient(45deg,#ffc107,#ff9800);
    border: none;
    font-weight: 500;
}

.btn-warning:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(255,152,0,0.3);
}

/* ================= FORM ================= */
form {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(25px);
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    animation: fadeUp 0.6s ease;
}

/* Inputs */
.form-control {
    border-radius: 12px;
    padding: 10px 12px;
    border: 1px solid #ddd;
    transition: 0.3s;
    font-size: 14px;
}

.form-control:focus {
    border-color: #30528D;
    box-shadow: 0 0 10px rgba(48,82,141,0.25);
}

/* Labels */
label {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 5px;
}

/* ================= TINYMCE ================= */
.tox-tinymce {
    border-radius: 15px !important;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* ================= SUBMIT BUTTON ================= */
button[type="submit"] {
    background: linear-gradient(135deg,#30528D,#007bff);
    border: none;
    font-weight: 600;
    border-radius: 40px;
    padding: 10px 20px;
    transition: 0.3s;
}

button[type="submit"]:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

/* ================= FIX ACTION BUTTON ALIGNMENT ================= */

.action-buttons {
    display: flex;
    flex-direction: column;
    align-items: flex-end; /* aligns right on desktop */
    gap: 10px;
}

/* Make secondary buttons aligned properly */
.secondary-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
}

/* Fix spacing for right column */
.col-lg-4 .action-buttons {
    margin-top: 20px;
}

/* ================= RESPONSIVE FIX ================= */

/* Tablet */
@media (max-width: 992px) {
    .action-buttons {
        align-items: center;
        margin-top: 20px;
    }

    .secondary-buttons {
        justify-content: center;
    }
}

/* Mobile */
@media (max-width: 576px) {
    .action-buttons {
        align-items: center;
        width: 100%;
    }

    .btn-lg {
        width: 100%;
        text-align: center;
    }

    .secondary-buttons {
        flex-direction: column;
        width: 100%;
    }

    .secondary-buttons .btn {
        width: 100%;
    }
}

/* ================= ANIMATION ================= */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ================= RESPONSIVE ================= */

/* Tablet */
@media (max-width: 992px) {
    .display-4 {
        font-size: 2rem;
    }

    form {
        padding: 25px;
    }

    button[type="submit"] {
        width: 50% !important;
    }
}

/* Mobile */
@media (max-width: 576px) {

    .display-4 {
        font-size: 1.6rem;
    }

    .card {
        margin-bottom: 20px;
    }

    button[type="submit"] {
        width: 100% !important;
    }

    .btn-lg {
        width: 100%;
        margin-bottom: 10px;
    }

    .btn-sm {
        display: block;
        width: 100%;
        margin-bottom: 8px;
    }

    form {
        padding: 20px;
    }
}

/* ================= NOTIFICATIONS ================= */
.notification-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10000;
    max-width: 400px;
}

.notification {
    background: #fff;
    padding: 16px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.3s ease-out;
    border-left: 4px solid #007bff;
}

.notification.success {
    border-left-color: #28a745;
}

.notification.success .notification-icon {
    color: #28a745;
}

.notification.error {
    border-left-color: #dc3545;
}

.notification.error .notification-icon {
    color: #dc3545;
}

.notification-icon {
    font-size: 20px;
    flex-shrink: 0;
}

.notification-content {
    flex: 1;
    font-size: 14px;
    color: #424242;
}

.notification-close {
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 18px;
    padding: 0;
    flex-shrink: 0;
}

.notification-close:hover {
    color: #333;
}

@keyframes slideIn {
    from {
        transform: translateX(400px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOut {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(400px);
        opacity: 0;
    }
}

.notification.hide {
    animation: slideOut 0.3s ease-out forwards;
}

@media (max-width: 768px) {
    .notification-container {
        left: 20px;
        right: 20px;
        max-width: none;
    }
}
    </style>

<body>

</div>

    <script>
              
     tinymce.init({
  selector: '#myTextarea',
  plugins: 'lists link image table code',
  toolbar: 'undo redo | bold italic underline | alignleft aligncenter alignright | bullist numlist | link image | code'
});

      const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "login.html";
        }

      // Notification function
      function showNotification(message, type = 'success', duration = 4000) {
        const container = document.getElementById('notificationContainer');
        
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        
        const iconMap = {
          'success': '✓',
          'error': '✕'
        };
        
        notification.innerHTML = `
          <div class="notification-icon">${iconMap[type] || '!'}</div>
          <div class="notification-content">${message}</div>
          <button class="notification-close">×</button>
        `;
        
        container.appendChild(notification);
        
        // Close button handler
        notification.querySelector('.notification-close').addEventListener('click', function() {
          notification.classList.add('hide');
          setTimeout(() => notification.remove(), 300);
        });
        
        // Auto-dismiss after duration
        if (duration > 0) {
          setTimeout(() => {
            if (notification.parentElement) {
              notification.classList.add('hide');
              setTimeout(() => notification.remove(), 300);
            }
          }, duration);
        }
      }

      // Form submission handler
        document.getElementById('myForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const imageUrl = document.getElementById('imageUrl').value;
            const content = tinymce.get('myTextarea').getContent(); // Get content from TinyMCE editor

            const postData = {
                title,
                category,
                imageUrl,
                content
            };

            console.log(postData); // Debugging: log the 
            console.log(localStorage.getItem("userEmail"));

            const token = localStorage.getItem("token");

            fetch('https://blueaxis-backend-10.onrender.com/api/addblog', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token   
                },
                body: JSON.stringify(postData)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showNotification(data.error, 'error');
                    } else {
                        showNotification('Blog created successfully!', 'success');
                        // Optionally, redirect to the blog page or clear the form
                        document.getElementById('myForm').reset()
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('An error occurred while creating the blog.', 'error');
                });
        });

        // Function to check if user is authenticated (has token in localStorage)
       const isAuthenticated = () => {
    return localStorage.getItem('token') !== null;
};

        // On page load, check authentication status and initialize form
        document.addEventListener('DOMContentLoaded', () => {
            if (!isAuthenticated()) {
                window.location.href = 'login.html'; // Redirect to login page if not authenticated
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            // URL of your API endpoint
            const apiUrl = 'https://blueaxis-backend-10.onrender.com/api/getblogs';

            // Function to fetch the total number of blogs
            async function fetchTotalBlogs() {
                try {
                    const token = localStorage.getItem("token");

                    const response = await fetch(apiUrl, {
                        method: "GET",
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    });

                    if (!response.ok) {
                        throw new Error("Unauthorized");
                    }

                    const data = await response.json();

                    // Assuming the API returns an array of blogs
                    const totalBlogs = data.length;

                    document.getElementById('total-blogs').textContent = totalBlogs;
                } catch (error) {
                    console.error('Error fetching total blogs:', error);
                    document.getElementById('total-blogs').textContent = 'Error';
                }
            }

            fetchTotalBlogs();
        });

        //logout button 
        const logoutButton = document.getElementById('logoutButton');

        // Add an event listener to the button
        logoutButton.addEventListener('click', () => {
            localStorage.removeItem('token'); // Remove the token from localStorage
            window.location.href = 'login.html'; // Redirect to the login page
        });
    </script>
