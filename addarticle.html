    <style>
       /* ================= GLOBAL ================= */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #eef3f9, #f9fbff);
    margin: 0;
    overflow-x: hidden;
}

/* Soft background glow */
body::before,
body::after {
    content: "";
    position: fixed;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
    opacity: 0.4;
}

body::before {
    background: #007bff;
    top: -100px;
    left: -100px;
}

body::after {
    background: #ff4d4d;
    bottom: -100px;
    right: -100px;
}

/* ================= HEADER ================= */
.display-4 {
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #0056d2, #ff3c3c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ================= LOGOUT ================= */
#logoutButton {
    border-radius: 30px;
    font-weight: 600;
    padding: 8px 20px;
    background: linear-gradient(45deg,#ffc107,#ff9800);
    border: none;
    transition: 0.3s;
}

#logoutButton:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(255,152,0,0.4);
}

/* ================= CARD ================= */
.card {
    border-radius: 18px !important;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    transition: 0.4s ease;
}

.card:hover {
    transform: translateY(-6px);
}

/* ================= BUTTONS ================= */
.btn-danger {
    background: linear-gradient(45deg,#ff4d4d,#e60023);
    border: none;
    font-weight: 600;
    transition: 0.3s;
}

.btn-danger:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255,0,0,0.3);
}

.btn-warning {
    background: linear-gradient(45deg,#ffc107,#ff9800);
    border: none;
    font-weight: 500;
}

.btn-warning:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(255,152,0,0.3);
}

/* ================= FORM ================= */
form {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(25px);
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    animation: fadeUp 0.6s ease;
}

/* Inputs */
.form-control {
    border-radius: 12px;
    padding: 10px 12px;
    border: 1px solid #ddd;
    transition: 0.3s;
    font-size: 14px;
}

.form-control:focus {
    border-color: #30528D;
    box-shadow: 0 0 10px rgba(48,82,141,0.25);
}

/* Labels */
label {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 5px;
}

/* ================= TINYMCE ================= */
.tox-tinymce {
    border-radius: 15px !important;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* ================= SUBMIT BUTTON ================= */
button[type="submit"] {
    background: linear-gradient(135deg,#30528D,#007bff);
    border: none;
    font-weight: 600;
    border-radius: 40px;
    padding: 10px 20px;
    transition: 0.3s;
}

button[type="submit"]:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

/* ================= ANIMATION ================= */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ================= RESPONSIVE ================= */

/* Tablet */
@media (max-width: 992px) {
    .display-4 {
        font-size: 2rem;
    }

    form {
        padding: 25px;
    }

    button[type="submit"] {
        width: 50% !important;
    }
}

/* Mobile */
@media (max-width: 576px) {

    .display-4 {
        font-size: 1.6rem;
    }

    .card {
        margin-bottom: 20px;
    }

    button[type="submit"] {
        width: 100% !important;
    }

    .btn-lg {
        width: 100%;
        margin-bottom: 10px;
    }

    .btn-sm {
        display: block;
        width: 100%;
        margin-bottom: 8px;
    }

    form {
        padding: 20px;
    }
}

/* ================= NOTIFICATIONS ================= */
.notification-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10000;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.notification {
    background: #ffffff;
    border-left: 4px solid #007bff;
    border-radius: 12px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
    padding: 16px 18px;
    display: flex;
    gap: 12px;
    align-items: center;
    animation: slideIn 0.3s ease-out;
}

.notification.success {
    border-left-color: #28a745;
}

.notification.error {
    border-left-color: #dc3545;
}

.notification-icon {
    font-size: 18px;
    font-weight: 700;
}

.notification-content {
    flex: 1;
    font-size: 14px;
    color: #334155;
}

.notification-close {
    background: transparent;
    border: none;
    color: #6b7280;
    font-size: 18px;
    cursor: pointer;
}

.notification-close:hover {
    color: #111827;
}

@keyframes slideIn {
    from {
        transform: translateX(24px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOut {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(24px);
        opacity: 0;
    }
}
    </style>

</head>

    <script>
    function showNotification(message, type = 'success', duration = 4000) {
        const container = document.getElementById('notificationContainer');
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.innerHTML = `
            <div class="notification-icon">${type === 'success' ? '✓' : '✕'}</div>
            <div class="notification-content">${message}</div>
            <button type="button" class="notification-close">×</button>
        `;

        const closeButton = notification.querySelector('.notification-close');
        closeButton.addEventListener('click', () => {
            notification.style.animation = 'slideOut 0.3s ease-out forwards';
            setTimeout(() => notification.remove(), 300);
        });

        container.appendChild(notification);

        setTimeout(() => {
            if (notification.parentElement) {
                notification.style.animation = 'slideOut 0.3s ease-out forwards';
                setTimeout(() => notification.remove(), 300);
            }
        }, duration);
    }

    tinymce.init({
        selector: '#myTextarea',
        plugins: 'link image lists table code',
        toolbar: 'undo redo | bold italic | alignleft aligncenter alignright | bullist numlist | link image | code',
    });

    const TOKEN_KEY = 'token';

    function getToken() {
        return localStorage.getItem(TOKEN_KEY);
    }

    function isAuthenticated() {
        return !!getToken();
    }

    function authHeaders(extra = {}) {
        return {
            ...extra,
            'Authorization': `Bearer ${getToken()}`
        };
    }

    async function fetchTotalArticles() {
        try {
            const response = await fetch('https://blueaxis-backend-11.onrender.com/api/getarticles', {
                method: 'GET',
                headers: authHeaders()
            });

            if (response.status === 401 || response.status === 403) {
                document.getElementById('total-blogs').textContent = 'Unauthorized';
                return;
            }

            if (!response.ok) {
                throw new Error(`Request failed: ${response.status}`);
            }

            const data = await response.json();
            const totalArticles = Array.isArray(data) ? data.length : 0;
            document.getElementById('total-blogs').textContent = totalArticles;
        } catch (error) {
            console.error('Error fetching total articles:', error);
            document.getElementById('total-blogs').textContent = 'Error';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!isAuthenticated()) {
            window.location.href = 'login.html';
            return;
        }

        fetchTotalArticles();
    });

    document.getElementById('myForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const imageUrl = document.getElementById('imageUrl').value;
        const content = tinymce.get('myTextarea').getContent();

        const postData = {
            title,
            category,
            imageUrl,
            content
        };

        try {
            const response = await fetch('https://blueaxis-backend-11.onrender.com/api/addarticle', {
                method: 'POST',
                headers: authHeaders({
                    'Content-Type': 'application/json'
                }),
                body: JSON.stringify(postData)
            });

            if (response.status === 401 || response.status === 403) {
                showNotification('Session expired. Please login again.', 'error');
                localStorage.removeItem(TOKEN_KEY);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);
                return;
            }

            if (!response.ok) {
                throw new Error(`Request failed: ${response.status}`);
            }

            const data = await response.json();

            if (data.error) {
                showNotification(data.error, 'error');
            } else {
                showNotification('Articles created successfully!', 'success');
                document.getElementById('myForm').reset();
                tinymce.get('myTextarea').setContent('');
                fetchTotalArticles();
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('An error occurred while creating the article.', 'error');
        }
    });

    const logoutButton = document.getElementById('logoutButton');

    logoutButton.addEventListener('click', () => {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem('userEmail');
        window.location.href = 'login.html';
    });
</script>
