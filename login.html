<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Login | BlueAxis Media</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

/* BODY */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f4f9ff, #9aa8c2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* MAIN CONTAINER */
        .login-container {
            display: flex;
            width: 900px;
            height: 520px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        /* LEFT PANEL */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #baceeb, rgba(218, 32, 33, 255));
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* LOGO */
        .logo-left {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 180px;
        }

        /* TEXT */
        .left-content h2 {
            font-size: 32px;
            font-weight: 700;
        }

        .left-content p {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
        }

        /* RIGHT PANEL */
        .right-panel {
            flex: 1;
            background: #ffffff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* TITLE */
        .right-panel h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
        }

        /* INPUT GROUP */
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        /* INPUTS */
        .input-group input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s;
        }

        /* ICON */
        .input-group i {
            position: absolute;
            right: 12px;
            top: 12px;
            color: #888;
            cursor: pointer;
        }

        /* FOCUS */
        .input-group input:focus {
            border-color: #0056d2;
            box-shadow: 0 0 10px rgba(0, 86, 210, 0.2);
            outline: none;
        }

        /* BUTTON */
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #0056d2, #d62424);
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* OPTIONS */
        .options {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 15px;
        }

        /* LINK */
        .options a {
            text-decoration: none;
            color: #0056d2;
        }

        /* REGISTER */
        .switch {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .switch a {
            color: #0056d2;
            font-weight: 600;
            text-decoration: none;
        }

        /* MESSAGE */
        #message {
            text-align: center;
            margin-top: 10px;
        }

        /* ANIMATION */
        .login-container {
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 90%;
                max-width: 400px;
                height: auto;
                margin: 20px 0;
            }

            .left-panel {
                height: auto;
                padding: 40px 20px;
                flex-direction: column;
                flex: none;
            }

            .logo-left {
                position: relative;
                top: auto;
                left: auto;
                margin-bottom: 20px;
                width: 140px;
            }

            .left-content h2 {
                font-size: 24px;
            }

            .right-panel {
                padding: 40px 25px;
                flex: none;
            }
        }
    </style>

</head>

<body>

    <div class="login-container">

        <!-- LEFT SIDE -->
        <div class="left-panel">
            <img src="assets/images/blueaxisLogo.png" class="logo-left">

            <div class="left-content">
                <h2>Welcome Back</h2>
                <p>Login to continue with BlueAxis Media</p>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right-panel">

            <h2>Login</h2>

            <form id="loginForm">

                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required>
                    <i class="fas fa-envelope"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fas fa-eye" onclick="togglePassword()"></i>
                </div>

                <div class="options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Log In</button>

                <div class="switch">
                    Don't have an account? <a href="/register.html">Register</a>
                </div>

            </form>

            <div id="message"></div>

        </div>

    </div>

    <script>

        /* PASSWORD TOGGLE */
        function togglePassword() {
            const pass = document.getElementById("password");
            pass.type = pass.type === "password" ? "text" : "password";
        }

        /* LOGIN */

        document.addEventListener('DOMContentLoaded', () => {

            const savedEmail = localStorage.getItem("registeredEmail");

            if (savedEmail) {
                document.getElementById("email").value = savedEmail;

                /* Optional: remove after filling */
                localStorage.removeItem("registeredEmail");
            }

        });
        document.getElementById('loginForm').addEventListener('submit', async function (e) {

            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {

                const response = await fetch('https://blueaxis-backend-11.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
if (data.token) {

    messageDiv.innerHTML = `<div style="color:green;">Login successful!</div>`;

    // ✅ STORE TOKEN (MOST IMPORTANT)
    localStorage.setItem("token", data.token);

    // Optional
    localStorage.setItem("userEmail", email);

    setTimeout(() => {
        window.location.href = "index.html";
    }, 1200);

} else {
    messageDiv.innerHTML = `<div style="color:red;">${data.message}</div>`;
}

            } catch (error) {
                messageDiv.innerHTML = `<div style="color:red;">Server error</div>`;
            }

        });

    </script>

</body>

</html>
